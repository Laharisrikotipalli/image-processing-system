name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run API unit tests
        run: |
          cd api-service
          pip install -r src/requirements.txt pytest
          pytest tests -v

      - name: Run Worker unit tests
        run: |
          cd worker-service
          pip install -r src/requirements.txt pytest pillow
          pytest tests -v


  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytest boto3 awscli pillow

      - name: Start LocalStack
        run: docker compose up -d localstack

      - name: Wait for LocalStack FULL READY
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"initialized": true'; then
              echo "LocalStack ready"
              break
            fi
            echo "Waiting for LocalStack..."
            sleep 2
          done

      - name: Create AWS resources
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://raw-images-propelhq || true
          aws --endpoint-url=http://localhost:4566 s3 mb s3://processed-images-propelhq || true
          aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name image-processing-queue-propelhq || true

      - name: Wait after creating resources
        run: sleep 5

      - name: Verify resources exist
        run: |
          aws --endpoint-url=http://localhost:4566 s3 ls
          aws --endpoint-url=http://localhost:4566 sqs list-queues

      - name: Start API + Worker
        run: docker compose up -d api worker

      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:5000/health | grep -q "ok"; then
              echo "API ready"
              break
            fi
            sleep 2
          done

      - name: Show API logs (debug if needed)
        run: docker logs api-service || true

      - name: Run integration tests
        run: pytest tests/integration --integration -v
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          S3_BUCKET_RAW: raw-images-propelhq
          S3_BUCKET_PROCESSED: processed-images-propelhq
          SQS_QUEUE_URL: http://localhost:4566/000000000000/image-processing-queue-propelhq


  build:
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t propelhq-api ./api-service

      - name: Build Worker image
        run: docker build -t propelhq-worker ./worker-service