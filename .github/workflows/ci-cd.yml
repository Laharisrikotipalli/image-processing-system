name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          cd api-service
          pip install -r src/requirements.txt pytest
          pytest tests -v

      - run: |
          cd worker-service
          pip install -r src/requirements.txt pytest pillow
          pytest tests -v


  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests pytest boto3 awscli pillow

      - run: docker compose up -d localstack

      - run: |
          for i in {1..30}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"initialized": true'; then
              echo "LocalStack ready"
              break
            fi
            sleep 2
          done

      - run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://raw-images-propelhq || true
          aws --endpoint-url=http://localhost:4566 s3 mb s3://processed-images-propelhq || true
          aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name image-processing-queue-propelhq || true

      - run: sleep 5

      - run: docker compose up -d api worker

      - run: |
          for i in {1..20}; do
            if curl -s http://localhost:5000/health | grep -q "ok"; then
              break
            fi
            sleep 2
          done

      - run: pytest tests/integration --integration -v
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          S3_BUCKET_RAW: raw-images-propelhq
          S3_BUCKET_PROCESSED: processed-images-propelhq
          SQS_QUEUE_URL: http://localhost:4566/000000000000/image-processing-queue-propelhq


  build:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t api ./api-service
      - run: docker build -t worker ./worker-service