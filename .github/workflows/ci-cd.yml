name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run API unit tests
        run: |
          cd api-service
          pip install -r src/requirements.txt -r requirements-test.txt
          pytest tests -v

      - name: Run Worker unit tests
        run: |
          cd worker-service
          pip install -r src/requirements.txt -r requirements-test.txt
          pytest tests -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # Pin boto3/botocore to match app requirements — latest botocore switched
        # SQS to JSON protocol which LocalStack 2.3 rejects with "Operation detection failed"
        run: pip install requests pytest pillow "boto3==1.26.165" "botocore==1.29.165"

      - name: Start LocalStack
        run: docker compose up -d localstack

      - name: Wait for LocalStack to be ready
        run: |
          for i in {1..30}; do
            STATUS=$(curl -sf http://localhost:4566/_localstack/health || true)
            if echo "$STATUS" | grep -q '"version"'; then
              echo "LocalStack ready: $STATUS"
              break
            fi
            echo "Waiting for LocalStack... attempt $i/30"
            sleep 2
          done

      - name: Run localstack-init to create AWS resources
        run: |
          docker compose up --no-build localstack-init
          EXIT=$(docker inspect localstack-init --format='{{.State.ExitCode}}')
          if [ "$EXIT" != "0" ]; then
            echo "localstack-init failed with exit code $EXIT"
            docker logs localstack-init
            exit 1
          fi
          echo "localstack-init completed successfully"

      - name: Verify resources exist
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "=== S3 Buckets ==="
          aws --endpoint-url=http://localhost:4566 s3 ls
          echo "=== SQS Queues ==="
          python3 - <<'EOF'
          import boto3
          sqs = boto3.client(
              "sqs",
              region_name="us-east-1",
              endpoint_url="http://localhost:4566",
              aws_access_key_id="test",
              aws_secret_access_key="test",
          )
          resp = sqs.list_queues()
          for url in resp.get("QueueUrls", []):
              print(url)
          EOF

      - name: Start API and Worker
        run: docker compose up -d --no-deps api worker

      - name: Wait for API to be ready
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:5000/health | grep -q "ok"; then
              echo "API ready"
              break
            fi
            echo "Waiting for API... attempt $i/20"
            sleep 2
          done

      - name: Show service logs (debug)
        if: always()
        run: |
          echo "=== LocalStack Init logs ===" && docker logs localstack-init || true
          echo "=== API logs ===" && docker logs api-service || true
          echo "=== Worker logs ===" && docker logs worker-service || true

      - name: Run integration tests
        env:
          API_BASE_URL: http://localhost:5000
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          S3_BUCKET_RAW: raw-images-propelhq
          S3_BUCKET_PROCESSED: processed-images-propelhq
          SQS_QUEUE_URL: http://localhost:4566/000000000000/image-processing-queue-propelhq
        run: pytest tests/integration --integration -v

  build:
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t propelhq-api ./api-service

      - name: Build Worker image
        run: docker build -t propelhq-worker ./worker-service